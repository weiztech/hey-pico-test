services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: test-heypico-web
    env_file:
      - ../.env.docker
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: test-heypico-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: test-heypico-open-webui
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - web
    restart: unless-stopped

volumes:
  redis-data:
  open-webui-data:
